# Note: true outbound egress restriction to api.anthropic.com only requires
# iptables rules on the host (see docs/security-hardening.md).
networks:
  ran-net:
    driver: bridge

services:
  ran-web:
    build: .
    container_name: ran-web
    restart: unless-stopped
    env_file:
      - backend/.env
    volumes:
      # Prompt file — fetched from accordant-eu/ran via fetch-prompt.sh, never committed
      - ./prompts:/app/prompts:ro
      # Ops data — codes.txt and ops_log.jsonl persist across restarts
      - ./data:/app/data
    environment:
      - INVITE_CODES_FILE=/app/data/codes.txt
      - OPS_LOG_FILE=/app/data/ops_log.jsonl
    ports:
      - "127.0.0.1:8000:8000"   # localhost only — nginx proxies externally
    # Read-only root filesystem — all writes go to bind-mounted /app/data.
    # tmpfs mounts provide writable scratch space for the runtime.
    read_only: true
    tmpfs:
      - /tmp:size=50m
      - /run:size=10m
    networks:
      - ran-net

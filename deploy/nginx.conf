# Rán — nginx reverse proxy configuration
# Target: ran.accordant.eu → uvicorn on 127.0.0.1:8001
#
# Place this file at: /etc/nginx/sites-available/ran-web
# Enable with: ln -s /etc/nginx/sites-available/ran-web /etc/nginx/sites-enabled/ran-web
# Get HTTPS cert: certbot --nginx -d ran.accordant.eu
# Test config: nginx -t
# Reload: systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ran.accordant.eu;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ran.accordant.eu;

    # TLS certificates (managed by Certbot / Let's Encrypt)
    # Certbot will fill these in automatically after: certbot --nginx -d ran.accordant.eu
    ssl_certificate     /etc/letsencrypt/live/ran.accordant.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ran.accordant.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    # No analytics, no tracking pixels, no external scripts
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # No cookies policy note: this server sets no cookies.
    # No analytics, no session storage, no tracking.

    # Serve static frontend files
    root /srv/ran-web/frontend;
    index index.html;

    # Frontend — serve static files directly
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API — proxy to uvicorn
    location /process {
        proxy_pass http://127.0.0.1:8001/process;
        proxy_http_version 1.1;

        # Required for streaming responses
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extended timeouts for Claude API calls (can take 10-30s)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        # File upload size limit — PDFs should be well under 10MB each
        client_max_body_size 25M;
    }

    location /health {
        proxy_pass http://127.0.0.1:8001/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Logs
    access_log /var/log/nginx/ran-web-access.log;
    error_log  /var/log/nginx/ran-web-error.log;
}

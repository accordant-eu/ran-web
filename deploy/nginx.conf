server {
    listen 80;
    server_name ran.accordant.eu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ran.accordant.eu;

    ssl_certificate /etc/letsencrypt/live/ran.accordant.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ran.accordant.eu/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25M;
    root /srv/ran-web/frontend;
    index index.html;

    # Static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # PDF processing:
    # - Rate limited in memory (5 req/min/IP) — blocks abuse without logging IPs
    # - access_log off — IPs never written to disk
    location /process {
        limit_req zone=ran_process burst=5 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        access_log off;
    }
}

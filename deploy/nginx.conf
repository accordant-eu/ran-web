server {
    listen 80;
    server_name ran.accordant.eu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ran.accordant.eu;

    ssl_certificate /etc/letsencrypt/live/ran.accordant.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ran.accordant.eu/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25M;

    # Serve frontend static files directly
    root /srv/ran-web/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API endpoints to FastAPI container
    location ~ ^/(process|health) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
